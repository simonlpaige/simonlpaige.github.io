<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" role="img" aria-label="Simon L. Paige wordmark">
  <title>Simon L. Paige — Wordmark</title>
  <!-- Concept 3: Pure typographic wordmark -->
  <!-- Source Serif 4, 600, tightly tuned. Prairie-rust period as signature. -->
  <rect width="520" height="120" fill="#F4EEE2"/>

  <text x="20" y="78"
        font-family="Source Serif 4, Georgia, serif"
        font-size="56"
        font-weight="600"
        fill="#1C1A17"
        letter-spacing="-0.015em">Simon L<tspan fill="#B45B2E">.</tspan> Paige</text>

  <!-- Subtle underline rule at baseline -->
  <rect x="20" y="92" width="480" height="1" fill="#C9BEAB"/>

  <!-- Small tagline in mono -->
  <text x="20" y="108"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="11"
        font-weight="500"
        fill="#6B665D"
        letter-spacing="0.12em">KANSAS CITY &middot; BUILDER</text>
</svg>
