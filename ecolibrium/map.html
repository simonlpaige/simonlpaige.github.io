{name:"Happy Planet Index",s:10,r:"UK",lat:51,lng:-0.1,url:"happyplanetindex.org",d:"Measures sustainable wellbeing: wellbeing x longevity / ecological footprint"},
// Section 11
{name:"HumanityOS",s:11,r:"USA",lat:45,lng:-93,url:"united-humanity.us",d:"Free CC0 cooperative platform and game engine for ending poverty"},

{name:"Solid (Tim Berners-Lee)",s:11,r:"UK",lat:51,lng:-1,url:"solidproject.org",d:"Decentralized data ownership protocol"},

// Apply jitter
orgs.forEach((o,i)=>{const j=jitter(i);o.lat+=j[0];o.lng+=j[1]});

// ── Build sidebar ──
const filtersEl=document.getElementById("filters");
const countEl=document.getElementById("count");
let activeFilter=null;

function makeBtn(id,label,color,count){
  const btn=document.createElement("button");
  btn.className="filter-btn"+(id===null?" active":"");
  btn.style.setProperty("--clr",color||"#94a3b8");
  btn.innerHTML=`<span class="dot" style="background:${color||'#94a3b8'}"></span><span class="label">${label}</span><span class="cnt">${count}</span>`;
  btn.onclick=()=>setFilter(id);
  filtersEl.appendChild(btn);
  return btn;
}

const sectionCounts=sections.map(s=>({...s,count:orgs.filter(o=>o.s===s.id).length}));
const allBtn=makeBtn(null,"All Sections","#94a3b8",orgs.length);
sectionCounts.forEach(s=>makeBtn(s.id,s.name,s.color,s.count));

function setFilter(id){
  activeFilter=id;
  document.querySelectorAll(".filter-btn").forEach((b,i)=>{
    b.classList.toggle("active",i===0?id===null:sections[i-1].id===id);
  });
  updateDots();
}

function updateDots(){
  const vis=activeFilter===null?orgs.length:orgs.filter(o=>o.s===activeFilter).length;
  countEl.textContent=`Showing ${vis} of ${orgs.length} organizations`;
  d3.selectAll(".org-dot").transition().duration(300)
    .attr("opacity",d=>activeFilter===null||d.s===activeFilter?0.85:0.08)
    .attr("r",d=>activeFilter===null||d.s===activeFilter?7:5);
}

// ── D3 Map ──
const container=document.getElementById("map-container");
const w=container.clientWidth,h=container.clientHeight;
const svg=d3.select(container).append("svg").attr("width",w).attr("height",h);
const projection=d3.geoNaturalEarth1().scale(w/5.8).translate([w/2,h/2]);
const path=d3.geoPath(projection);

const g=svg.append("g");

// Graticule
g.append("path").datum(d3.geoGraticule()()).attr("class","graticule").attr("d",path);

// Zoom
const zoom=d3.zoom().scaleExtent([1,12]).on("zoom",e=>{g.attr("transform",e.transform)});
svg.call(zoom);
document.getElementById("reset-btn").onclick=()=>svg.transition().duration(600).call(zoom.transform,d3.zoomIdentity);

// Tooltip
const tip=document.getElementById("tooltip");
const tipName=tip.querySelector(".t-name");
const tipMeta=tip.querySelector(".t-meta");
const tipDesc=tip.querySelector(".t-desc");
const tipLink=tip.querySelector(".t-link");

function showTip(ev,d){
  const sec=sectionMap[d.s];
  tipName.textContent=d.name;
  tipName.style.color=sec.color;
  tipMeta.textContent=`${d.r} · ${sec.name}`;
  tipDesc.textContent=d.d.length>130?d.d.slice(0,127)+"...":d.d;
  if(d.url){
    tipLink.style.display="inline";
    tipLink.textContent=d.url;
    tipLink.href=d.url.startsWith("http")?d.url:"https://"+d.url;
  }else{tipLink.style.display="none"}
  tip.style.display="block";
  positionTip(ev);
}
function positionTip(ev){
  const r=container.getBoundingClientRect();
  let x=ev.clientX-r.left+16,y=ev.clientY-r.top+16;
  if(x+290>r.width)x=ev.clientX-r.left-296;
  if(y+160>r.height)y=ev.clientY-r.top-170;
  tip.style.left=x+"px";tip.style.top=y+"px";
}
function hideTip(){tip.style.display="none"}

// Load world
d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world=>{
  const countries=topojson.feature(world,world.objects.countries);
  g.selectAll(".country").data(countries.features).join("path").attr("class","country").attr("d",path);

  // Org dots
  function darken(hex){
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgb(${r*.6|0},${g*.6|0},${b*.6|0})`;
  }
  g.selectAll(".org-dot").data(orgs).join("circle")
    .attr("class","org-dot")
    .attr("cx",d=>projection([d.lng,d.lat])[0])
    .attr("cy",d=>projection([d.lng,d.lat])[1])
    .attr("r",7)
    .attr("fill",d=>sectionMap[d.s].color)
    .attr("opacity",0.85)
    .attr("stroke",d=>darken(sectionMap[d.s].color))
    .attr("stroke-width",1.5)
    .style("cursor","pointer")
    .style("transition","transform .15s")
    .on("mouseenter",function(ev,d){
      d3.select(this).transition().duration(150).attr("r",10);
      showTip(ev,d);
    })
    .on("mousemove",(ev)=>positionTip(ev))
    .on("mouseleave",function(){
      const isActive=activeFilter===null||d3.select(this).datum().s===activeFilter;
      d3.select(this).transition().duration(150).attr("r",isActive?7:5);
      hideTip();
    });

  updateDots();
}).catch(err=>{
  // Fallback: show dots without country shapes
  console.warn("Could not load world topology:",err);
  function darken(hex){
    const r=parseInt(hex.slice(1,3),16),gg=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgb(${r*.6|0},${gg*.6|0},${b*.6|0})`;
  }
  g.selectAll(".org-dot").data(orgs).join("circle")
    .attr("class","org-dot")
    .attr("cx",d=>projection([d.lng,d.lat])[0])
    .attr("cy",d=>projection([d.lng,d.lat])[1])
    .attr("r",7)
    .attr("fill",d=>sectionMap[d.s].color)
    .attr("opacity",0.85)
    .attr("stroke",d=>darken(sectionMap[d.s].color))
    .attr("stroke-width",1.5)
    .style("cursor","pointer")
    .on("mouseenter",function(ev,d){d3.select(this).transition().duration(150).attr("r",10);showTip(ev,d)})
    .on("mousemove",(ev)=>positionTip(ev))
    .on("mouseleave",function(){const isA=activeFilter===null||d3.select(this).datum().s===activeFilter;d3.select(this).transition().duration(150).attr("r",isA?7:5);hideTip()});
  updateDots();
});

// Resize
window.addEventListener("resize",()=>{
  const nw=container.clientWidth,nh=container.clientHeight;
  svg.attr("width",nw).attr("height",nh);
  projection.scale(nw/5.8).translate([nw/2,nh/2]);
  g.selectAll(".country").attr("d",path);
  g.selectAll(".graticule").attr("d",path);
  g.selectAll(".org-dot").attr("cx",d=>projection([d.lng,d.lat])[0]).attr("cy",d=>projection([d.lng,d.lat])[1]);
});
</script>
</body>
