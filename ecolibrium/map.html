<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecolibrium Directory — World Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a100a;color:#cce8b0}

/* ── Desktop layout ── */
#app{display:flex;height:100vh;flex-direction:row}
#sidebar{width:260px;min-width:260px;background:#121d12;border-right:1px solid #1a2a1a;display:flex;flex-direction:column;overflow-y:auto;z-index:10;flex-shrink:0}
#sidebar::-webkit-scrollbar{width:5px}
#sidebar::-webkit-scrollbar-track{background:#121d12}
#sidebar::-webkit-scrollbar-thumb{background:#253825;border-radius:3px}
#sidebar-header{padding:20px 18px 14px;border-bottom:1px solid #1a2a1a}
#sidebar-header h1{font-size:16px;font-weight:700;color:#cce8b0;letter-spacing:-0.2px}
#sidebar-header p{font-size:11px;color:#4a7040;margin-top:3px;line-height:1.4}
#count{font-size:12px;color:#5e8a52;padding:10px 18px 6px;font-weight:500}
#filters{padding:4px 10px 16px;display:flex;flex-direction:column;gap:3px}
.filter-btn{display:flex;align-items:center;gap:9px;padding:7px 10px;border:1.5px solid transparent;border-radius:7px;background:transparent;cursor:pointer;transition:all .15s;font-size:12px;color:#8aaa7a;font-family:inherit;text-align:left}
.filter-btn:hover{background:#192819;color:#cce8b0}
.filter-btn.active{background:#192819;border-color:var(--clr);color:#cce8b0;box-shadow:0 0 10px -3px var(--clr)}
.filter-btn .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.filter-btn .label{flex:1;line-height:1.3}
.filter-btn .cnt{font-size:10px;color:#3d5e35;min-width:18px;text-align:right}
.filter-btn.active .cnt{color:#5e8a52}

/* ── Mobile: chips across top ── */
#chip-bar{display:none}

@media(max-width:640px){
  #app{flex-direction:column}
  #sidebar{display:none}
  #chip-bar{
    display:flex;overflow-x:auto;gap:6px;
    padding:8px 10px;background:#121d12;
    border-bottom:1px solid #1a2a1a;
    flex-shrink:0;z-index:10;
    scrollbar-width:none;
  }
  #chip-bar::-webkit-scrollbar{display:none}
  .chip{
    display:inline-flex;align-items:center;gap:5px;
    padding:5px 11px;border-radius:20px;
    border:1.5px solid #253825;background:#192819;
    font-size:11px;font-weight:600;color:#7aaa6a;
    white-space:nowrap;cursor:pointer;flex-shrink:0;
    font-family:inherit;transition:all .15s;
  }
  .chip.active{border-color:var(--clr);color:#cce8b0;box-shadow:0 0 8px -2px var(--clr)}
  .chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  #map-container{flex:1;min-height:0}
  #reset-btn{top:8px;right:8px;padding:5px 10px;font-size:11px}
  #count-mobile{
    position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
    background:#121d12cc;backdrop-filter:blur(6px);
    border:1px solid #253825;border-radius:20px;
    padding:3px 12px;font-size:11px;color:#5e8a52;
    pointer-events:none;z-index:5;white-space:nowrap;
  }
  #tooltip{max-width:calc(100vw - 24px);font-size:12px}
}

#map-container{flex:1;position:relative;background:#0a100a;overflow:hidden}
svg{display:block}
#reset-btn{position:absolute;top:12px;right:12px;background:#162016dd;backdrop-filter:blur(4px);border:1px solid #253825;color:#6b9e5e;padding:6px 13px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;z-index:5;transition:all .15s}
#reset-btn:hover{background:#253825;color:#cce8b0}
#tooltip{position:absolute;pointer-events:none;background:#162016f0;backdrop-filter:blur(8px);border:1px solid #253825;border-radius:10px;padding:12px 14px;max-width:280px;font-size:13px;line-height:1.45;z-index:20;display:none;box-shadow:0 8px 32px #0009}
#tooltip .t-name{font-weight:700;font-size:14px;margin-bottom:2px}
#tooltip .t-meta{font-size:11px;color:#4a7040;margin-bottom:6px}
#tooltip .t-desc{color:#8aaa7a;margin-bottom:6px}
#tooltip .t-link{font-size:11px;color:#78c87a;text-decoration:none;pointer-events:auto}
#tooltip .t-link:hover{text-decoration:underline}
.graticule{fill:none;stroke:#162016;stroke-width:.4}
.country{fill:#1a2a1a;stroke:#253825;stroke-width:.5}

/* Loading spinner */
#loading{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:50;
  background:#0a100a;gap:14px;
}
#loading .spinner{
  width:36px;height:36px;border:3px solid #1a2a1a;
  border-top-color:#4ade80;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:#4a7040;font-size:13px}
</style>
</head>
<body>
<div id="chip-bar"></div>
<div id="app">
<div id="sidebar">
<div id="sidebar-header">
<h1>Ecolibrium Directory</h1>
<p>Interactive map of organizations building<br>a more equitable world</p>
</div>
<div id="count"></div>
<div id="filters"></div>
</div>
<div id="map-container">
<div id="loading"><div class="spinner"></div><p>Loading organizations…</p></div>
<button id="reset-btn">↻ Reset</button>
<div id="count-mobile"></div>
<div id="tooltip">
<div class="t-name"></div>
<div class="t-meta"></div>
<div class="t-desc"></div>
<a class="t-link" target="_blank" rel="noopener"></a>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
const AREA_COLORS = {
  democracy:'#60a5fa', cooperatives:'#34d399', healthcare:'#f472b6',
  food:'#fb923c', education:'#a78bfa', housing_land:'#fbbf24',
  conflict:'#f87171', energy_digital:'#22d3ee', recreation_arts:'#e879f9',
  ecology:'#4ade80'
};
const DEFAULT_COLOR = '#94a3b8';

const AREA_NAMES = {
  democracy:'Democratic Infrastructure', cooperatives:'Cooperatives & Solidarity Economy',
  healthcare:'Healthcare', food:'Food & Agriculture', education:'Education',
  housing_land:'Housing & Land', conflict:'Conflict Resolution',
  energy_digital:'Energy & Digital Commons', recreation_arts:'Recreation & Arts',
  ecology:'Ecological Restoration'
};

function getColor(f){ return AREA_COLORS[f] || DEFAULT_COLOR; }

function dotRadius(d){
  if(d.m === 'research') return 3;
  if(d.r && d.r > 1000000) return 4;
  if(d.r && d.r > 100000) return 3;
  return 2;
}

function darken(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${r*.5|0},${g*.5|0},${b*.5|0})`;
}

// ── D3 Map setup (start before data loads) ──
const container = document.getElementById('map-container');
let w = container.clientWidth, h = container.clientHeight;
const svg = d3.select(container).append('svg').attr('width', w).attr('height', h);
const projection = d3.geoNaturalEarth1().scale(w / 5.8).translate([w / 2, h / 2]);
const path = d3.geoPath(projection);
const g = svg.append('g');

// Graticule
g.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d',path);

// Zoom
const zoom = d3.zoom().scaleExtent([1,12]).on('zoom', e => { g.attr('transform', e.transform); });
svg.call(zoom);
document.getElementById('reset-btn').onclick = () =>
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity);

// Tooltip
const tip = document.getElementById('tooltip');
const tipName = tip.querySelector('.t-name');
const tipMeta = tip.querySelector('.t-meta');
const tipDesc = tip.querySelector('.t-desc');
const tipLink = tip.querySelector('.t-link');

function showTip(ev, d){
  const color = getColor(d.f);
  const areaName = AREA_NAMES[d.f] || d.f || '';
  const country = d.cc || 'US';
  tipName.textContent = d.n;
  tipName.style.color = color;
  tipMeta.textContent = `${country} · ${areaName}`;
  tipDesc.textContent = (d.d || '').length > 130 ? (d.d).slice(0,127)+'...' : (d.d || '');
  if(d.w){
    tipLink.style.display = 'inline';
    tipLink.textContent = d.w;
    tipLink.href = d.w.startsWith('http') ? d.w : 'https://'+d.w;
  } else {
    tipLink.style.display = 'none';
  }
  tip.style.display = 'block';
  positionTip(ev);
}
function positionTip(ev){
  const r = container.getBoundingClientRect();
  let x = ev.clientX - r.left + 16, y = ev.clientY - r.top + 16;
  if(x + 290 > r.width) x = ev.clientX - r.left - 296;
  if(y + 170 > r.height) y = ev.clientY - r.top - 180;
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}
function hideTip(){ tip.style.display = 'none'; }

// State
let activeFilter = null;
let orgs = [];

function setFilter(id){
  activeFilter = id;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === (id === null ? '__all' : id));
  });
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('active', c.dataset.id === (id === null ? '__all' : id));
  });
  updateDots();
}

function updateDots(){
  const vis = activeFilter === null ? orgs.length : orgs.filter(o => o.f === activeFilter).length;
  const countEl = document.getElementById('count');
  const countMobile = document.getElementById('count-mobile');
  countEl.textContent = `Showing ${vis.toLocaleString()} of ${orgs.length.toLocaleString()} organizations`;
  if(countMobile) countMobile.textContent = `${vis.toLocaleString()} organizations`;
  d3.selectAll('.org-dot').transition().duration(300)
    .attr('opacity', d => activeFilter === null || d.f === activeFilter ? 0.85 : 0.07)
    .attr('r', d => activeFilter === null || d.f === activeFilter ? dotRadius(d) + 1 : dotRadius(d));
}

function buildUI(meta){
  const filtersEl = document.getElementById('filters');
  const chipBar = document.getElementById('chip-bar');
  const byArea = meta.by_area || {};

  // All button
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.dataset.filter = '__all';
  allBtn.style.setProperty('--clr', '#78c87a');
  allBtn.innerHTML = `<span class="dot" style="background:#78c87a"></span><span class="label">All</span><span class="cnt">${meta.total.toLocaleString()}</span>`;
  allBtn.onclick = () => setFilter(null);
  filtersEl.appendChild(allBtn);

  // All chip
  const allChip = document.createElement('button');
  allChip.className = 'chip active';
  allChip.dataset.id = '__all';
  allChip.style.setProperty('--clr', '#78c87a');
  allChip.innerHTML = `<span class="chip-dot" style="background:#78c87a"></span>All`;
  allChip.onclick = () => setFilter(null);
  chipBar.appendChild(allChip);

  // Per-area buttons
  const areas = Object.keys(AREA_NAMES);
  areas.forEach(area => {
    const color = AREA_COLORS[area] || DEFAULT_COLOR;
    const cnt = byArea[area] || 0;
    if(!cnt) return;

    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = area;
    btn.style.setProperty('--clr', color);
    btn.innerHTML = `<span class="dot" style="background:${color}"></span><span class="label">${AREA_NAMES[area]}</span><span class="cnt">${cnt.toLocaleString()}</span>`;
    btn.onclick = () => setFilter(area);
    filtersEl.appendChild(btn);

    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.dataset.id = area;
    chip.style.setProperty('--clr', color);
    const shortName = AREA_NAMES[area].split(' &')[0].split(' /')[0];
    chip.innerHTML = `<span class="chip-dot" style="background:${color}"></span>${shortName}`;
    chip.onclick = () => setFilter(area);
    chipBar.appendChild(chip);
  });
}

function renderDots(data){
  g.selectAll('.org-dot').data(data).join('circle')
    .attr('class','org-dot')
    .attr('cx', d => projection([d.lo, d.la])[0])
    .attr('cy', d => projection([d.lo, d.la])[1])
    .attr('r', d => dotRadius(d) + 1)
    .attr('fill', d => getColor(d.f))
    .attr('opacity', 0.85)
    .attr('stroke', d => darken(getColor(d.f)))
    .attr('stroke-width', 1)
    .style('cursor','pointer')
    .on('mouseenter', function(ev, d){
      d3.select(this).transition().duration(100).attr('r', dotRadius(d) + 4);
      showTip(ev, d);
    })
    .on('mousemove', ev => positionTip(ev))
    .on('mouseleave', function(ev, d){
      const isActive = activeFilter === null || d.f === activeFilter;
      d3.select(this).transition().duration(100).attr('r', isActive ? dotRadius(d)+1 : dotRadius(d));
      hideTip();
    });
  updateDots();
}

// ── Load world topology and data ──
Promise.all([
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'),
  fetch('./data/search/map_points.json').then(r => r.json()),
  fetch('./data/search/map_meta.json').then(r => r.json()),
]).then(([world, points, meta]) => {
  orgs = points;

  // Draw countries
  const countries = topojson.feature(world, world.objects.countries);
  g.selectAll('.country').data(countries.features).join('path')
    .attr('class','country').attr('d',path);

  // Build UI
  buildUI(meta);

  // Render dots
  renderDots(orgs);

  // Hide loader
  document.getElementById('loading').style.display = 'none';

}).catch(err => {
  console.error('Load error:', err);
  const loadEl = document.getElementById('loading');
  loadEl.querySelector('p').textContent = 'Error loading data. Check console.';
  loadEl.querySelector('.spinner').style.display = 'none';
});

// ── Resize handler ──
window.addEventListener('resize', () => {
  w = container.clientWidth; h = container.clientHeight;
  svg.attr('width', w).attr('height', h);
  projection.scale(w / 5.8).translate([w / 2, h / 2]);
  g.selectAll('.country').attr('d', path);
  g.selectAll('.graticule').attr('d', path);
  g.selectAll('.org-dot')
    .attr('cx', d => projection([d.lo, d.la])[0])
    .attr('cy', d => projection([d.lo, d.la])[1]);
});
</script>
</body>
</html>
