<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecolibrium — Mapping the Networks of Change</title>
<link href="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.5.0/dist/maplibre-gl.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a100a;
    color: #cce8b0;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #layout {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px;
    flex-shrink: 0;
    background: #0d160d;
    border-right: 1px solid #1e2e1e;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    z-index: 10;
    scrollbar-width: thin;
    scrollbar-color: #253825 transparent;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: #253825; border-radius: 2px; }

  .sb-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid #1e2e1e;
  }
  .sb-title {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 3px;
    color: #78c87a;
    text-shadow: 0 0 20px rgba(120,200,122,0.4);
  }
  .sb-sub {
    font-size: 10px;
    color: #4a7040;
    letter-spacing: 1px;
    margin-top: 3px;
    text-transform: uppercase;
  }

  .sb-stats {
    padding: 12px 16px;
    font-size: 12px;
    color: #6a9060;
    line-height: 1.8;
  }
  .sb-stats span {
    color: #78c87a;
    font-weight: 700;
    font-size: 14px;
  }

  .sb-divider {
    height: 1px;
    background: #1e2e1e;
    margin: 4px 0;
  }

  .sb-label {
    padding: 10px 16px 6px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #3d5a3d;
    text-transform: uppercase;
  }

  #filters {
    padding: 4px 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: #8aaa7a;
    font-size: 12px;
    text-align: left;
    transition: all 0.15s ease;
    width: 100%;
  }
  .filter-btn:hover {
    background: #162016;
    border-color: #253825;
    color: #cce8b0;
  }
  .filter-btn.active {
    background: #162016;
    border-color: #3a5a3a;
    color: #cce8b0;
  }
  .filter-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }
  .filter-label { flex: 1; font-size: 11px; }
  .filter-count {
    font-size: 10px;
    color: #4a7040;
    font-variant-numeric: tabular-nums;
  }
  .filter-btn.active .filter-count { color: #6a9060; }

  #regions {
    padding: 4px 10px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .region-btn {
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid #1e2e1e;
    background: #111811;
    color: #6a9060;
    font-size: 11px;
    text-align: left;
    transition: all 0.15s ease;
    width: 100%;
  }
  .region-btn:hover {
    background: #162016;
    border-color: #253825;
    color: #cce8b0;
  }

  .sb-hint {
    margin-top: auto;
    padding: 12px 16px;
    font-size: 10px;
    color: #2d3d2d;
    line-height: 1.7;
    border-top: 1px solid #1e2e1e;
  }

  /* ── Map ── */
  #map {
    flex: 1;
    height: 100vh;
  }

  /* ── Loading overlay ── */
  #loading {
    position: fixed;
    inset: 0;
    background: #0a100a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s ease;
  }
  #loading.fade-out { opacity: 0; pointer-events: none; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #1e2e1e;
    border-top-color: #78c87a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-title {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 4px;
    color: #78c87a;
    text-shadow: 0 0 30px rgba(120,200,122,0.5);
    margin-bottom: 6px;
  }
  .loading-sub {
    font-size: 11px;
    color: #4a7040;
    letter-spacing: 2px;
  }

  /* ── MapLibre Popup ── */
  .maplibregl-popup-content {
    background: #162016f0;
    backdrop-filter: blur(8px);
    border: 1px solid #253825;
    border-radius: 10px;
    padding: 12px 14px;
    color: #cce8b0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    max-width: 280px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .maplibregl-popup-tip { border-top-color: #162016 !important; }
  .maplibregl-popup-close-button {
    color: #5e8a52;
    font-size: 16px;
    padding: 4px 8px;
    line-height: 1;
  }
  .maplibregl-popup-close-button:hover { color: #78c87a; background: transparent; }

  .pop-name { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
  .pop-meta { font-size: 11px; color: #4a7040; margin-bottom: 6px; }
  .pop-desc { font-size: 12px; color: #8aaa7a; margin-bottom: 6px; line-height: 1.5; }
  .pop-link { font-size: 11px; color: #78c87a; text-decoration: none; display: inline-block; margin-top: 2px; }
  .pop-link:hover { text-decoration: underline; }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    #sidebar { display: none; }

    #mobile-bar {
      display: flex;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: #0d160dec;
      backdrop-filter: blur(12px);
      border-top: 1px solid #1e2e1e;
      padding: 8px 10px;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #mobile-bar::-webkit-scrollbar { display: none; }

    .mobile-chip {
      flex-shrink: 0;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid #253825;
      background: #111811;
      color: #8aaa7a;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.15s;
    }
    .mobile-chip.active {
      background: #162016;
      border-color: #3a5a3a;
      color: #cce8b0;
    }
    .mobile-chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  }

  @media (min-width: 641px) {
    #mobile-bar { display: none; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-title">ECOLIBRIUM</div>
  <div class="loading-sub">loading networks of change…</div>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="sb-header">
      <div class="sb-title">ECOLIBRIUM</div>
      <div class="sb-sub">mapping the networks of change</div>
    </div>
    <div class="sb-stats">
      <span id="total-count">—</span> organizations<br>
      <span id="country-count">—</span> countries
    </div>
    <div class="sb-divider"></div>
    <div class="sb-label">Filter by Network</div>
    <div id="filters"></div>
    <div class="sb-divider"></div>
    <div class="sb-label">Explore Regions</div>
    <div id="regions"></div>
    <div class="sb-hint">scroll to zoom · click clusters to expand · click orgs for details</div>
  </div>

  <div id="map"></div>
</div>

<!-- Mobile bottom bar -->
<div id="mobile-bar"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────

const AREA_COLORS = {
  democracy:      '#4da6ff',
  cooperatives:   '#00e87a',
  healthcare:     '#ff6eb4',
  food:           '#ff9500',
  education:      '#b388ff',
  housing_land:   '#ffe066',
  conflict:       '#ff6b6b',
  energy_digital: '#00e5ff',
  recreation_arts:'#e040fb',
  ecology:        '#69ff47'
};
const DEFAULT_COLOR = '#aaaaaa';

const AREA_NAMES = {
  democracy:      'Democratic Infrastructure',
  cooperatives:   'Cooperatives & Solidarity Economy',
  healthcare:     'Healthcare',
  food:           'Food & Agriculture',
  education:      'Education',
  housing_land:   'Housing & Land',
  conflict:       'Conflict Resolution',
  energy_digital: 'Energy & Digital Commons',
  recreation_arts:'Recreation & Arts',
  ecology:        'Ecological Restoration'
};

const REGIONS = [
  { name: '🌐 World',    center: [0, 20],    zoom: 1.5 },
  { name: '🌎 Americas', center: [-80, 10],  zoom: 2.5 },
  { name: '🌍 Africa',   center: [20, 5],    zoom: 3   },
  { name: '🌏 Asia',     center: [100, 25],  zoom: 3   },
  { name: '🇪🇺 Europe',  center: [15, 52],   zoom: 4   },
];

// ── Jitter ─────────────────────────────────────────────────────────────────

function jitter(name, la, lo) {
  let seed = 0;
  for (let i = 0; i < name.length; i++)
    seed = (seed * 31 + name.charCodeAt(i)) & 0xffffffff;
  const r1 = Math.abs(((seed * 1664525 + 1013904223) & 0xffffffff) / 2147483648);
  const r2 = Math.abs(((seed * 22695477 + 1) & 0xffffffff) / 2147483648);
  const spread = 1.8;
  return [la + (r1 - 0.5) * spread, lo + (r2 - 0.5) * spread];
}

// ── State ──────────────────────────────────────────────────────────────────

let currentGeojson = null;
let activeFilter = null;
let mapReady = false;
let dataReady = false;

// ── Map init ───────────────────────────────────────────────────────────────

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  center: [0, 20],
  zoom: 1.5,
  minZoom: 1,
  maxZoom: 14,
  attributionControl: false
});

map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

// ── Color expression ───────────────────────────────────────────────────────

const colorExpr = ['match', ['get', 'f'],
  'democracy',      '#4da6ff',
  'cooperatives',   '#00e87a',
  'healthcare',     '#ff6eb4',
  'food',           '#ff9500',
  'education',      '#b388ff',
  'housing_land',   '#ffe066',
  'conflict',       '#ff6b6b',
  'energy_digital', '#00e5ff',
  'recreation_arts','#e040fb',
  'ecology',        '#69ff47',
  '#aaaaaa'
];

// ── Build GeoJSON from raw points ──────────────────────────────────────────

function buildGeojson(points) {
  return {
    type: 'FeatureCollection',
    features: points.map(p => {
      const [jla, jlo] = jitter(p.n || '', p.la, p.lo);
      return {
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [jlo, jla] },
        properties: { ...p }
      };
    })
  };
}

// ── Add map sources & layers ───────────────────────────────────────────────

function addLayers(geojson) {
  map.addSource('orgs', {
    type: 'geojson',
    data: geojson,
    cluster: true,
    clusterMaxZoom: 9,
    clusterRadius: 40,
    clusterProperties: {
      democracy_c:      ['+', ['case', ['==', ['get', 'f'], 'democracy'],      1, 0]],
      cooperatives_c:   ['+', ['case', ['==', ['get', 'f'], 'cooperatives'],   1, 0]],
      healthcare_c:     ['+', ['case', ['==', ['get', 'f'], 'healthcare'],     1, 0]],
      food_c:           ['+', ['case', ['==', ['get', 'f'], 'food'],           1, 0]],
      education_c:      ['+', ['case', ['==', ['get', 'f'], 'education'],      1, 0]],
      housing_land_c:   ['+', ['case', ['==', ['get', 'f'], 'housing_land'],   1, 0]],
      conflict_c:       ['+', ['case', ['==', ['get', 'f'], 'conflict'],       1, 0]],
      energy_digital_c: ['+', ['case', ['==', ['get', 'f'], 'energy_digital'], 1, 0]],
      recreation_arts_c:['+', ['case', ['==', ['get', 'f'], 'recreation_arts'],1, 0]],
      ecology_c:        ['+', ['case', ['==', ['get', 'f'], 'ecology'],        1, 0]],
    }
  });

  // Heatmap (behind clusters)
  map.addLayer({
    id: 'heatmap',
    type: 'heatmap',
    source: 'orgs',
    maxzoom: 8,
    paint: {
      'heatmap-weight': ['interpolate', ['linear'], ['zoom'], 0, 0.3, 6, 1],
      'heatmap-intensity': ['interpolate', ['linear'], ['zoom'], 0, 0.8, 6, 2],
      'heatmap-color': [
        'interpolate', ['linear'], ['heatmap-density'],
        0,   'rgba(4,9,4,0)',
        0.1, 'rgba(0,232,122,0.3)',
        0.3, 'rgba(77,166,255,0.5)',
        0.5, 'rgba(255,110,180,0.6)',
        0.7, 'rgba(255,149,0,0.7)',
        1.0, 'rgba(255,255,150,0.9)'
      ],
      'heatmap-radius': ['interpolate', ['linear'], ['zoom'], 0, 20, 6, 40],
      'heatmap-opacity': ['interpolate', ['linear'], ['zoom'], 5, 0.8, 8, 0]
    }
  });

  // Cluster circles
  map.addLayer({
    id: 'clusters',
    type: 'circle',
    source: 'orgs',
    filter: ['has', 'point_count'],
    paint: {
      'circle-color': '#78c87a',
      'circle-radius': ['step', ['get', 'point_count'], 12, 10, 18, 50, 24, 200, 32],
      'circle-opacity': 0.85,
      'circle-blur': 0.3,
      'circle-stroke-width': 1.5,
      'circle-stroke-color': '#ffffff',
      'circle-stroke-opacity': 0.2
    }
  });

  // Cluster count labels
  map.addLayer({
    id: 'cluster-count',
    type: 'symbol',
    source: 'orgs',
    filter: ['has', 'point_count'],
    layout: {
      'text-field': ['get', 'point_count_abbreviated'],
      'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
      'text-size': 11
    },
    paint: {
      'text-color': '#ffffff',
      'text-opacity': 0.9
    }
  });

  // Individual unclustered points
  map.addLayer({
    id: 'unclustered-point',
    type: 'circle',
    source: 'orgs',
    filter: ['!', ['has', 'point_count']],
    paint: {
      'circle-color': colorExpr,
      'circle-radius': ['interpolate', ['linear'], ['zoom'], 9, 3, 12, 6, 14, 8],
      'circle-opacity': 0.8,
      'circle-blur': 0.2,
      'circle-stroke-width': 0.5,
      'circle-stroke-color': '#000000',
      'circle-stroke-opacity': 0.3
    }
  });
}

// ── Interactions ───────────────────────────────────────────────────────────

function setupInteractions() {
  // Click cluster → zoom in
  map.on('click', 'clusters', (e) => {
    const features = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
    const clusterId = features[0].properties.cluster_id;
    map.getSource('orgs').getClusterExpansionZoom(clusterId, (err, zoom) => {
      if (err) return;
      map.easeTo({
        center: features[0].geometry.coordinates,
        zoom: zoom + 1,
        duration: 600
      });
    });
  });

  // Click org → popup
  map.on('click', 'unclustered-point', (e) => {
    const props = e.features[0].properties;
    const coords = e.features[0].geometry.coordinates.slice();
    const color = AREA_COLORS[props.f] || DEFAULT_COLOR;
    const areaName = AREA_NAMES[props.f] || props.f || '';

    // Ensure popup stays in view when near antimeridian
    while (Math.abs(e.lngLat.lng - coords[0]) > 180)
      coords[0] += e.lngLat.lng > coords[0] ? 360 : -360;

    const desc = props.d && props.d !== 'null' ? props.d : '';
    const website = props.w && props.w !== 'null' ? props.w : '';
    const country = props.cc && props.cc !== 'null' ? props.cc : 'US';

    const descHtml = desc
      ? `<div class="pop-desc">${desc.slice(0, 150)}${desc.length > 150 ? '…' : ''}</div>`
      : '';
    const linkHtml = website
      ? `<a class="pop-link" href="${website.startsWith('http') ? website : 'https://' + website}" target="_blank" rel="noopener">↗ ${website.replace(/^https?:\/\//, '').split('/')[0]}</a>`
      : '';

    new maplibregl.Popup({ className: 'org-popup', offset: 10 })
      .setLngLat(coords)
      .setHTML(`
        <div class="pop-name" style="color:${color}">${props.n || 'Organization'}</div>
        <div class="pop-meta">${country} · ${areaName}</div>
        ${descHtml}
        ${linkHtml}
      `)
      .addTo(map);
  });

  // Cursors
  map.on('mouseenter', 'clusters', () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', 'clusters', () => { map.getCanvas().style.cursor = ''; });
  map.on('mouseenter', 'unclustered-point', () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', 'unclustered-point', () => { map.getCanvas().style.cursor = ''; });
}

// ── Filter logic ───────────────────────────────────────────────────────────

function setFilter(area) {
  activeFilter = area;

  if (area === null) {
    map.setFilter('unclustered-point', ['!', ['has', 'point_count']]);
    map.setFilter('heatmap', null);
    map.getSource('orgs').setData(currentGeojson);
  } else {
    map.setFilter('unclustered-point', ['all',
      ['!', ['has', 'point_count']],
      ['==', ['get', 'f'], area]
    ]);
    map.setFilter('heatmap', ['==', ['get', 'f'], area]);
    const filtered = {
      type: 'FeatureCollection',
      features: currentGeojson.features.filter(f => f.properties.f === area)
    };
    map.getSource('orgs').setData(filtered);
  }

  updateSidebarActive(area);
}

function updateSidebarActive(area) {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.area === (area || ''));
  });
  document.querySelectorAll('.mobile-chip[data-area]').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.area === (area || ''));
  });
}

// ── Sidebar build ──────────────────────────────────────────────────────────

function buildSidebar(points) {
  // Count by area
  const counts = {};
  for (const p of points) {
    counts[p.f] = (counts[p.f] || 0) + 1;
  }

  const countries = new Set(points.map(p => p.cc).filter(Boolean)).size;
  document.getElementById('total-count').textContent = points.length.toLocaleString();
  document.getElementById('country-count').textContent = countries;

  const filtersEl = document.getElementById('filters');
  const mobileBar = document.getElementById('mobile-bar');

  // "All" button
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.dataset.area = '';
  allBtn.innerHTML = `
    <div class="filter-dot" style="background:#78c87a;box-shadow:0 0 6px #78c87a"></div>
    <span class="filter-label">All Networks</span>
    <span class="filter-count">${points.length.toLocaleString()}</span>
  `;
  allBtn.addEventListener('click', () => setFilter(null));
  filtersEl.appendChild(allBtn);

  // Mobile "All" chip
  const allChip = document.createElement('div');
  allChip.className = 'mobile-chip active';
  allChip.dataset.area = '';
  allChip.innerHTML = `<div class="mobile-chip-dot" style="background:#78c87a"></div>All`;
  allChip.addEventListener('click', () => setFilter(null));
  mobileBar.appendChild(allChip);

  // Per-area buttons
  const areas = Object.keys(AREA_COLORS).filter(a => counts[a] > 0);
  for (const area of areas) {
    const color = AREA_COLORS[area];
    const count = counts[area] || 0;
    const name = AREA_NAMES[area] || area;

    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.area = area;
    btn.innerHTML = `
      <div class="filter-dot" style="background:${color};box-shadow:0 0 6px ${color}"></div>
      <span class="filter-label">${name}</span>
      <span class="filter-count">${count.toLocaleString()}</span>
    `;
    btn.addEventListener('click', () => setFilter(area));
    filtersEl.appendChild(btn);

    // Mobile chip
    const chip = document.createElement('div');
    chip.className = 'mobile-chip';
    chip.dataset.area = area;
    chip.innerHTML = `<div class="mobile-chip-dot" style="background:${color}"></div>${name}`;
    chip.addEventListener('click', () => setFilter(area));
    mobileBar.appendChild(chip);
  }

  // Region buttons
  const regionsEl = document.getElementById('regions');
  for (const region of REGIONS) {
    const btn = document.createElement('button');
    btn.className = 'region-btn';
    btn.textContent = region.name;
    btn.addEventListener('click', () => {
      map.flyTo({ center: region.center, zoom: region.zoom, duration: 1200 });
    });
    regionsEl.appendChild(btn);
  }
}

// ── Loading done ───────────────────────────────────────────────────────────

function checkReady() {
  if (mapReady && dataReady) {
    const overlay = document.getElementById('loading');
    overlay.classList.add('fade-out');
    setTimeout(() => overlay.remove(), 600);
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────

map.on('load', () => {
  mapReady = true;

  // If data already loaded, add layers now
  if (currentGeojson) {
    addLayers(currentGeojson);
    setupInteractions();
  }

  checkReady();
});

// Fetch data
fetch('./data/search/map_points.json')
  .then(r => r.json())
  .then(points => {
    currentGeojson = buildGeojson(points);
    buildSidebar(points);
    dataReady = true;

    // If map already loaded, add layers now
    if (mapReady) {
      addLayers(currentGeojson);
      setupInteractions();
    }

    checkReady();
  })
  .catch(err => {
    console.error('Failed to load map_points.json:', err);
    // Show error in loading overlay
    const sub = document.querySelector('.loading-sub');
    if (sub) sub.textContent = 'error loading data — check console';
  });
</script>
</body>
